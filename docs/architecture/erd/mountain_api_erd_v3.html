<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mountain API – Database Schema v3</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f9f9f7;
      color: #1a1a18;
      margin: 0;
      padding: 2rem;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    p.subtitle {
      font-size: 13px;
      color: #6b6b66;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }
    #erd {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 12px;
      padding: 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e0dfd8; }
      #erd { background: #232320; border-color: #3a3a36; }
      p.subtitle { color: #9c9a92; }
    }
  </style>
</head>
<body>
  <h1>Mountain API — Database Schema v3</h1>
  <p class="subtitle">Entity Relationship Diagram · All tables, fields, and relationships</p>
  <div id="erd"></div>

  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    await document.fonts.ready;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        fontFamily: 'sans-serif',
        lineColor: dark ? '#9c9a92' : '#73726c',
        textColor: dark ? '#c2c0b6' : '#3d3d3a',
      },
    });

    const { svg } = await mermaid.render('erd-svg', `erDiagram
      ADMINISTRATIVE_REGION {
        uuid id PK
        string province
        string regency_city
        string district
        string village
      }
      MOUNTAIN {
        uuid id PK
        string name
        uuid region_id FK
        int elevation_masl
        string coordinates
        text description
        boolean is_open
        boolean is_active
        date closed_since
        float avg_rating
      }
      MOUNTAIN_IMAGE {
        uuid id PK
        uuid mountain_id FK
        string image_url
        int position
        boolean is_cover
        timestamp uploaded_at
      }
      BASECAMP {
        uuid id PK
        uuid mountain_id FK
        string name
        string address
        string coordinates
        string contact
      }
      MOUNTAIN_RATING {
        uuid id PK
        uuid user_id FK
        uuid mountain_id FK
        int score
        text review
        timestamp created_at
      }
      COMMENT {
        uuid id PK
        uuid user_id FK
        uuid mountain_id FK
        text content
        timestamp created_at
        timestamp updated_at
      }
      USER {
        uuid id PK
        string username
        string email
        string password_hash
        string avatar_url
        boolean is_active
        timestamp created_at
      }
      POST {
        uuid id PK
        uuid author_id FK
        string title
        text body
        timestamp created_at
        timestamp updated_at
      }
      POST_IMAGE {
        uuid id PK
        uuid post_id FK
        string image_url
        int position
        timestamp uploaded_at
      }
      POST_REPLY {
        uuid id PK
        uuid post_id FK
        uuid author_id FK
        uuid parent_reply_id FK
        text content
        timestamp created_at
        timestamp updated_at
      }
      POST_TAG {
        uuid id PK
        uuid post_id FK
        string keyword
      }

      ADMINISTRATIVE_REGION ||--o{ MOUNTAIN : "contains"
      MOUNTAIN ||--o{ MOUNTAIN_IMAGE : "has"
      MOUNTAIN ||--o{ BASECAMP : "has"
      MOUNTAIN ||--o{ MOUNTAIN_RATING : "rated via"
      MOUNTAIN ||--o{ COMMENT : "receives"
      USER ||--o{ MOUNTAIN_RATING : "rates"
      USER ||--o{ COMMENT : "writes"
      USER ||--o{ POST : "authors"
      USER ||--o{ POST_REPLY : "writes"
      POST ||--o{ POST_IMAGE : "has"
      POST ||--o{ POST_REPLY : "has"
      POST ||--o{ POST_TAG : "tagged with"
      POST_REPLY ||--o{ POST_REPLY : "replied to by"
    `);

    document.getElementById('erd').innerHTML = svg;

    document.querySelectorAll('#erd svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>
</body>
</html>
